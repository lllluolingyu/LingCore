# LingCore coding-agent profile.
#
# Runs against a local OpenAI-compatible server (Ollama/vLLM) by default,
# which needs no API key. To target OpenAI (or any keyed provider), set
# LINGCORE_API_KEY_ENV to the name of the env var holding your key, e.g.
#   LINGCORE_API_KEY_ENV=OPENAI_API_KEY  (and export OPENAI_API_KEY=sk-...)
# No secret ever lives in this file — api_key_env only *names* the variable.

name: coding

# Workspace the agent's file/shell tools are confined to. Relative paths are
# resolved against this profile's directory; "." here means the repo root when
# launched from it. Override with an absolute path for real use.
workspace: ${LINGCORE_WORKSPACE:-.}

llm:
  model: ${LINGCORE_MODEL:-claude-opus-4-8}
  base_url: ${LINGCORE_BASE_URL:-https://luolingyu.com/v1}
  # Empty by default -> keyless (fine for local Ollama/vLLM). Set the env var
  # below to a key-holding variable name when targeting a keyed provider.
  api_key_env: ${LINGCORE_API_KEY_ENV:-LLY_API_KEY}
  sampling:
    temperature: 0.2

persona:
  system_prompt: |
    You are a coding assistant operating inside a sandboxed workspace.
    You can read, write, edit, list, and search files, and run shell
    commands — all confined to the workspace directory.

    Work in small, verifiable steps. Before editing a file, read it. After
    changing code, run the relevant build or tests to confirm it works.
    When you make `edit_file` calls, the `old` text must be unique in the
    file. Prefer running commands over guessing at their output.

    Be concise. Explain what you changed and why, not every step you took.

tools:
  - read_file
  - write_file
  - edit_file
  - list_dir
  - search
  - run_shell
  - fetch_url
  - patch_file

tool_options:
  run_shell:
    # Seconds before a shell command is killed.
    timeout: 60
    # Require interactive confirmation before each shell command runs.
    require_confirmation: true
    # Commands whose text starts with any of these prefixes skip the
    # confirmation prompt. Keep this to read-only / verification commands;
    # the CLI's "allow always" choice appends to this list for the session.
    allow_patterns:
      - "python -m pytest"
      - "python3 -m pytest"
      - "python -m unittest"
      - "python3 -m unittest"
      - "pytest"
      - "ls"
      - "cat "
      - "git status"
      - "git diff"

memory:
  max_messages: 50
  max_tokens: 16000

loop:
  max_iters: 30
  parallel_tools: true

guardrail:
  policy: noop
