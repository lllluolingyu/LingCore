# LingCore coding-agent profile (keyed provider).
# Secrets never live here — api_key_env only *names* the env var holding the key.
# Copy .env.example to .env for local configuration.

name: coding
# Where the agent's file tools and shell operate. Unset resolves to
# ./workspace inside this profile dir — point it at a real project with
# --workspace or LINGCORE_WORKSPACE.
workspace: ${LINGCORE_WORKSPACE:-}

llm:
  model: ${LINGCORE_MODEL:-claude-opus-4-8}
  base_url: ${LINGCORE_BASE_URL:-https://luolingyu.com/v1}
  api_key_env: ${LINGCORE_API_KEY_ENV:-LLY_API_KEY}
  # Route same-session requests to the same warm prompt-cache node. Turn off if
  # your endpoint rejects the prompt_cache_key field.
  send_prompt_cache_key: true
  sampling:
    temperature: 0.2

persona:
  # Inline fallback — role.md / workflow.md are loaded automatically if present.
  system_prompt: |
    You are a coding assistant. Your file tools (read_file, write_file,
    edit_file, patch_file, list_dir, search) are confined to the workspace
    directory. run_shell, however, executes commands on the host and is NOT
    sandboxed — it can read and write files outside the workspace. Prefer the
    file tools for workspace work, and treat shell commands with corresponding
    care.

tools:
  - read_file
  - pdf2md
  - write_file
  - edit_file
  - list_dir
  - search
  - run_shell
  - fetch_url
  - patch_file

tool_options:
  run_shell:
    timeout: 60
    require_confirmation: true
    # Stage shell output longer than this to <workspace>/.lingcore/tool-output/
    # and return a lean preview + path (read the rest with read_file). Set to 0
    # to disable and fall back to truncation at max_output_chars.
    offload_over_chars: 8000
    # Auto-approved command patterns (no confirmation prompt). A multi-token
    # pattern matches that command plus ANY trailing arguments; a bare program
    # name matches only itself with no arguments. None ship by default: even
    # innocuous-looking prefixes authorize arbitrary behavior through extra
    # arguments (`git diff --no-index /dev/null /etc/passwd` reads any file;
    # `python -m pytest /tmp/x.py` runs arbitrary code) — so every pattern here
    # is an explicit operator decision. Shell control syntax (`;`, `&`, `&&`,
    # pipes, redirects, substitutions, newlines) is never auto-approved. Example:
    # allow_patterns:
    #   - "git status --short"
    allow_patterns: []
  fetch_url:
    offload_over_chars: 8000
  read_file:
    # Read large files in slices; the model can page with offset/limit.
    max_lines: 2000
    max_line_chars: 2000
  list_dir:
    max_entries: 200

memory:
  max_messages: 50
  max_tokens: 16000
  # Evict in one chunk down to 50% of the budget (hysteresis) so the rendered
  # prefix stays stable across many turns — the key to prompt-cache hits.
  evict_to_ratio: 0.5
  # Near-full? Summarize the oldest history first; eviction is the fallback.
  compaction:
    enabled: true
    compact_at_ratio: 0.85
    keep_recent_ratio: 0.35
    max_summary_chars: 4000

loop:
  max_iters: 30
  parallel_tools: true

guardrail:
  policy: noop
