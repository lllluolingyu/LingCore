# LingCore general daily-assistant profile (keyed provider).
# Secrets never live here — api_key_env only *names* the env var holding the key.
#
# A general-purpose everyday assistant: research, planning, note-taking, and
# remembering your preferences across sessions. It does NOT run shell commands.

name: daily
# Notes and saved files land in ./workspace inside this profile dir by
# default — override with --workspace or LINGCORE_WORKSPACE.
workspace: ${LINGCORE_WORKSPACE:-}

llm:
  model: ${LINGCORE_MODEL:-deepseek-v4-pro}
  base_url: ${LINGCORE_BASE_URL:-https://luolingyu.com/v1}
  api_key_env: ${LINGCORE_API_KEY_ENV:-LLY_API_KEY}
  # Modality registration: attachment kinds the model accepts natively as
  # content parts. deepseek-v4-pro is text-only, so none are registered —
  # attached images/PDFs degrade to text via media_fallback below instead of
  # erroring mid-turn. (Omitting this key means [image, file], full native.)
  modalities: []
  sampling:
    temperature: 0.6

persona:
  # Inline fallback — world.md / role.md / workflow.md load automatically.
  system_prompt: |
    You are a helpful general-purpose daily assistant.

tools:
  - read_file
  - pdf2md
  - write_file
  - edit_file
  - list_dir
  - search
  - fetch_url
  - memory
  - activate_skill

tool_options:
  fetch_url:
    # Public-web research only; private/loopback targets stay blocked.
    max_bytes: 1048576
  memory:
    # Persistent notes/preferences, profile-scoped (resolves against this dir).
    path: memory.md
    max_bytes: 65536
    # When the file passes compact_at_ratio × max_bytes, condense it with the
    # model (merge/drop stale notes) instead of hard-failing the write.
    auto_compact: true
    compact_at_ratio: 0.8
  activate_skill:
    skills_dir: skills
    allow_concurrent: false

# Text fallbacks for the modalities registered above (llm.modalities).
# PDFs already degrade to extracted markdown automatically (pdf: markdown is
# the default; needs the optional pymupdf extra — a dev clone has it via
# `uv sync`). Without an image fallback, attached images become a short
# "cannot view images" note. To have them described by a vision-capable
# model on the same endpoint instead, uncomment and name one:
media_fallback:
  image:
    model: Qwen/Qwen3.6-27B
    base_url: ${LINGCORE_BASE_URL:-https://luolingyu.com/v1}
    api_key_env: ${LINGCORE_API_KEY_ENV:-LLY_API_KEY}

memory:
  max_messages: 60
  max_tokens: 16000

loop:
  max_iters: 20
  parallel_tools: true

guardrail:
  policy: noop
